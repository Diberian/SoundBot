name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PyInstaller and dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements.txt
          echo "Python dependencies installed:"
          pip list | head -20

      - name: Download AI models
        run: |
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build backend with PyInstaller
        run: |
          cd backend
          pyinstaller main.spec --clean
          echo "Backend executable built:"
          ls -la dist/

      - name: Check backend executable
        run: |
          echo "Backend executable location:"
          ls -la backend/dist/
          echo "Backend executable size:"
          ls -lh backend/dist/SoundBot-backend

      - name: Check package size
        run: |
          echo "Backend executable size:"
          ls -lh backend/dist/SoundBot-backend
          echo "Models size:"
          du -sh models/

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PyInstaller and dependencies
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements.txt
          echo "Python dependencies installed:"
          pip list | Select-Object -First 20

      - name: Download AI models
        shell: pwsh
        run: |
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build backend with PyInstaller
        shell: pwsh
        run: |
          cd backend
          pyinstaller main.spec --clean
          echo "Backend executable built:"
          Get-ChildItem dist/

      - name: Check backend executable
        shell: pwsh
        run: |
          Write-Host "Backend executable location:"
          Get-ChildItem backend/dist/
          Write-Host "Backend executable size:"
          Get-ChildItem backend/dist/SoundBot-backend.exe | Select-Object Length

      - name: Check package size
        shell: pwsh
        run: |
          Write-Host "Backend executable size:"
          Get-ChildItem backend/dist/SoundBot-backend.exe | Select-Object Length
          Write-Host "Models size:"
          Get-ChildItem models/ -Recurse | Measure-Object -Property Length -Sum | Select-Object Sum

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-Windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/SoundBot-macOS/*
            artifacts/SoundBot-Windows/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
