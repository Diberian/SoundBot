name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 构建模型包（跨平台共享）
  build-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Python virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install transformers torch torchaudio

      - name: Download AI models
        run: |
          cd backend
          source venv/bin/activate
          cd ..
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create Models package
        run: |
          echo "=== Creating Models package ==="
          mkdir -p release
          cd models
          zip -r ../release/models.zip .
          cd ..
          echo "Models package created:"
          ls -lh release/
          echo "=== Package contents ==="
          unzip -l release/models.zip | head -20

      - name: Upload Models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-package
          path: release/models.zip
          if-no-files-found: error

  # 构建 macOS venv 包
  build-venv-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Python virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create macOS venv package
        run: |
          echo "=== Creating macOS venv package ==="
          mkdir -p release
          cd backend
          zip -r ../release/venv-macos.zip venv/
          cd ..
          echo "macOS venv package created:"
          ls -lh release/

      - name: Upload macOS venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv-macos-package
          path: release/venv-macos.zip
          if-no-files-found: error

  # 构建 Windows venv 包
  build-venv-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Python virtual environment
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          # 安装依赖，但排除 uvloop（Windows 不支持）
          # 先创建过滤后的 requirements 文件
          (Get-Content requirements.txt) | Where-Object { $_ -notmatch 'uvloop' -and $_ -match '\S' } | Set-Content requirements-windows.txt
          Write-Host "=== Filtered requirements ==="
          Get-Content requirements-windows.txt | Select-Object -First 20
          # 安装过滤后的依赖
          pip install -r requirements-windows.txt
          # 删除临时文件
          Remove-Item requirements-windows.txt

      - name: Create Windows venv package
        shell: pwsh
        run: |
          echo "=== Creating Windows venv package ==="
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path backend\venv -DestinationPath release\venv-windows.zip -Force
          Write-Host "Windows venv package created:"
          Get-ChildItem release/ | Format-Table Name, Length

      - name: Upload Windows venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv-windows-package
          path: release\venv-windows.zip
          if-no-files-found: error

  # 构建 macOS 应用（轻量级，不包含模型和venv）
  build-macos-app:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check macOS build size
        run: |
          echo "=== macOS Build Size ==="
          ls -lh dist/

      - name: List packaged files
        run: |
          echo "=== Checking app bundle contents ==="
          if [ -d "dist/mac/SoundBot.app/Contents/Resources/app" ]; then
            ls -la "dist/mac/SoundBot.app/Contents/Resources/app/"
          fi
          if [ -d "dist/mac-arm64/SoundBot.app/Contents/Resources/app" ]; then
            ls -la "dist/mac-arm64/SoundBot.app/Contents/Resources/app/"
          fi

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-macOS-app
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  # 构建 Windows 应用（轻量级，不包含模型和venv）
  build-windows-app:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Windows build size
        shell: pwsh
        run: |
          echo "=== Windows Build Size ==="
          Get-ChildItem dist/ | ForEach-Object { Write-Host "$($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }

      - name: List packaged files
        shell: pwsh
        run: |
          echo "=== Checking app bundle contents ==="
          if (Test-Path "dist/win-unpacked/resources/app") {
            Get-ChildItem "dist/win-unpacked/resources/app" -Depth 1
          }

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-Windows-app
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  # 发布 Release
  release:
    needs: [build-models, build-venv-macos, build-venv-windows, build-macos-app, build-windows-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -name "*.zip" -o -name "*.dmg" -o -name "*.exe" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
