name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed:"
          pip list | head -20

      - name: Download AI models
        run: |
          cd backend
          source venv/bin/activate
          cd ..
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python virtual environment
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed:"
          pip list | Select-Object -First 20

      - name: Download AI models
        shell: pwsh
        run: |
          cd backend
          .\venv\Scripts\Activate.ps1
          cd ..
          python scripts/download_models.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundBot-Windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la artifacts/
          find artifacts/ -type f -name "*"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/SoundBot-macOS/*
            artifacts/SoundBot-Windows/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
